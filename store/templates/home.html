{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShoeDog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body>
    <div class="container px-0">
      <div class="position-relative py-3">
        <div class="position-absolute end-0 top-50 translate-middle-y pe-3">
          {% if user.is_authenticated %}
            <a href="{% url 'logout' %}" class="btn btn-outline-dark me-2 fw-bold border-2">Logout</a>
            <a href="{% url 'view_cart' %}" class="btn btn-outline-dark fw-bold border-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-cart" viewBox="0 0 16 16">
                <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M3.102 4l1.313 7h8.17l1.313-7zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2" />
              </svg>
            </a>
          {% else %}
            <a href="{% url 'login' %}" class="btn btn-outline-dark me-2 fw-bold border-2">Login</a>
            <a href="{% url 'signup' %}" class="btn btn-outline-dark fw-bold border-2">Sign Up</a>
          {% endif %}
        </div>
        <div class="text-center">
          <h1 class="custom-text mb-0">SHOEDOG</h1>
          <p class="tagline lead mt-0">LEAD THE STREET</p>
        </div>
      </div>
    </div>
    <div class="container mt-4">
      <div class="row g-4">
        {% for product in products %}
          <div class="col-md-4">
            <div class="card h-100 d-flex flex-column border-2 border-dark">
              <img src="{{ product.image.url }}" class="card-img-top" />
              <div class="card-body d-flex flex-column">
                <h5 class="card-title fs-3 fw-bold">{{ product.name }}</h5>
                <p class="card-text">{{ product.description }}</p>
                <p class="fw-bold">₹{{ product.price }}</p>
                <a href="{% url 'add_to_cart' product.id %}" class="add-btn btn mt-auto">ADD</a>
              </div>
            </div>
          </div>
        {% endfor %}
      </div>
    </div>
    <footer style="color:#3f3f3f; font-size: large;" class="text-center py-3 mt-4">
      <a href="https://github.com/dchoudhry7" style="color:#3f3f3f; text-decoration: none;">&copy; By Dhairya Choudhry</a>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
      window.addEventListener('beforeunload', function () {
        localStorage.setItem('scrollPos', window.scrollY)
      })
      window.addEventListener('load', function () {
        const scrollPos = localStorage.getItem('scrollPos')
        if (scrollPos !== null) {
          window.scrollTo(0, parseInt(scrollPos))
          localStorage.removeItem('scrollPos')
        }
      })
    </script>
  </body>
</html>

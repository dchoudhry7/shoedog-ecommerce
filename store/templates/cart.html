{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="d-flex align-items-center position-relative mb-5">
        <a href="/" class="btn btn-outline-dark fw-bold border-2">&lt; Home</a>
        <h2 class="fw-bold fs-1 position-absolute start-50 translate-middle-x mb-0">YOUR CART</h2>
      </div>
      {% for item in items %}
        <div class="card mb-3 shadow-sm border-2 border-dark">
          <div class="row g-0 align-items-center">
            <div class="col-md-2 product-img-container d-flex justify-content-center align-items-center">
              <img src="{{ item.product.image.url }}" class="img-fluid" style="max-height: 120px; object-fit: contain;" />
            </div>
            <div class="col-md-7">
              <div class="card-body py-2">
                <h5 class="fw-bold fs-4 mb-1">{{ item.product.name }}</h5>
                <p class="mb-1 text-muted">Quantity: {{ item.quantity }}</p>
                <p class="mb-1">Price: ₹{{ item.product.price }}</p>
                <p class="fw-semibold mb-0">Subtotal: ₹{{ item.subtotal }}</p>
              </div>
            </div>
            <div class="col-md-3 d-flex justify-content-center align-items-center">
              <div class="qty-box d-flex align-items-center">
                <a href="{% url 'decrease_quantity' item.id %}" class="btn btn-outline-dark border-2 btn-sm px-3 fw-bold">−</a>
                <span class="mx-3 fw-bold">{{ item.quantity }}</span>
                <a href="{% url 'increase_quantity' item.id %}" class="btn btn-outline-dark border-2 btn-sm px-3 fw-bold">+</a>
              </div>
            </div>
          </div>
        </div>
      {% endfor %}
      <div class="d-flex justify-content-between align-items-center mt-4">
        <h4 class="fw-bold mb-0">Total: ₹{{ total }}</h4>
        <a href="{% url 'checkout' %}" class="btn btn-dark btn-lg px-4">Checkout</a>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      window.addEventListener('beforeunload', function () {
        localStorage.setItem('scrollPos', window.scrollY)
      })
      window.addEventListener('load', function () {
        const scrollPos = localStorage.getItem('scrollPos')
        if (scrollPos !== null) {
          window.scrollTo(0, parseInt(scrollPos))
          localStorage.removeItem('scrollPos')
        }
      })
    </script>
  </body>
</html>
